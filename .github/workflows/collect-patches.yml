name: Collect Patch Data

on:
  schedule:
    # Runs daily at 08:00 UTC (6:00 PM AEST / 7:00 PM AEDT)
    - cron: "0 8 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      year:
        description: "Year to collect (e.g. 2026) — leave blank for current"
        required: false
      month:
        description: "Month number to collect (e.g. 6) — leave blank for current"
        required: false

jobs:
  collect:
    name: Collect Patch Data
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit data files
      issues: write     # needed to create notification issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run patch collectors
        env:
          CISCO_CLIENT_ID: ${{ secrets.CISCO_CLIENT_ID }}
          CISCO_CLIENT_SECRET: ${{ secrets.CISCO_CLIENT_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="${{ github.event.inputs.year }}"
          fi
          if [ -n "${{ github.event.inputs.month }}" ]; then
            ARGS="$ARGS ${{ github.event.inputs.month }}"
          fi
          python collect.py $ARGS

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update patch data $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Notify via GitHub Issue
        if: hashFiles('.data_changed') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().split('T')[0];
            const month = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });

            let summary = 'New patch data has been collected.';
            try {
              const data = JSON.parse(fs.readFileSync('data/latest/patch-data.json', 'utf8'));
              const platforms = data.platforms || {};
              const lines = Object.entries(platforms)
                .filter(([_, p]) => p && !p.error)
                .map(([k, p]) => `- **${k.replace(/_/g, ' ')}**: ${p.summary || 'Data collected'}`)
                .join('\n');
              summary = `## ${month} Patch Data Collected\n\n${lines}`;
            } catch (e) {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 New Patch Data: ${month}`,
              body: `${summary}\n\n---\n\n📝 [View article draft](../../blob/main/data/latest/patch-draft.md)\n🌐 [View GitHub Pages site](https://${context.repo.owner}.github.io/${context.repo.repo}/)\n\n*Auto-generated by patch-tuesday-tracker on ${today}*`,
              labels: ["patch-data", "automated"]
            });

      - name: Clean up flag file
        if: always()
        run: rm -f .data_changed
